name: CareerOS CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Job 1: Lint & Build Next.js Frontend
  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Lint Code
        run: npm run lint

      - name: Typecheck TypeScript
        run: npx tsc --noEmit

      - name: Compile Next.js Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  # Job 2: Build Express Backend
  backend-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Backend Dependencies
        run: |
          cd server
          npm ci

      - name: Compile Backend TypeScript
        run: |
          cd server
          npm run build

  # Job 3: Verify Docker Staging Orchestration
  docker-validation:
    needs: [frontend-check, backend-check]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Compose Config
        run: docker compose -f docker/docker-compose.yml config
